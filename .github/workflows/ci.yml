###############################################################################
# CI — Pull Request Validation
#
# Runs on every PR targeting main. Blocks merge if any check fails.
#
# Checks:
#   1. Terraform format   — enforces consistent HCL style (terraform fmt -check)
#   2. Terraform validate — catches syntax errors and missing required variables
#   3. Terraform plan     — shows the proposed diff against staging state
#   4. Docker build       — verifies the predictor image builds cleanly
#   5. Predictor & bridge tests — prediction logic, business rules, ack/nack
#   6. Dataflow tests     — dedup/parse transform unit tests (DoFns invoked directly)
#   7. Cost-guard tests   — kill-switch threshold, DRY_RUN, teardown isolation
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GCP_PROJECT_ID          — project-6db0f664-1423-47cb-86d
#   GCP_REGION              — us-central1
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — projects/<NUM>/locations/global/workloadIdentityPools/...
#   GCP_SERVICE_ACCOUNT     — github-actions@<PROJECT>.iam.gserviceaccount.com
#   TF_STATE_BUCKET         — project-6db0f664-1423-47cb-86d-tf-state
#   BILLING_ACCOUNT_ID      — XXXXXX-XXXXXX-XXXXXX
###############################################################################

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - 'vertex_ai/**'
      - 'pipelines/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation
  pull-requests: write  # Required to post plan output as PR comment

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        # Workload Identity Federation is the secure way to authenticate GitHub Actions
        # to GCP — no long-lived service account JSON keys stored as secrets.
        # Setup: https://github.com/google-github-actions/auth#setting-up-workload-identity-federation

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
        # fmt failure is surfaced in the PR comment below, not as a hard failure.
        # This prevents blocking the plan output when only formatting differs.

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=staging.tfvars \
            -var="billing_account_id=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -no-color \
            -input=false \
            -lock=false \
            -out=tfplan.binary
        # -lock=false: PR plans are speculative and read-only — they never
        # apply, so they don't need to acquire the state lock. This keeps the
        # CI identity's state-bucket access read-only (least privilege: a PR
        # run cannot write state or lock out a real apply). The apply path
        # (run locally / with elevated identity) still locks normally.
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );

            const output = `## Terraform Plan
            #### Format: \`${{ steps.fmt.outcome }}\`
            #### Init: \`${{ steps.init.outcome }}\`
            #### Validate: \`${{ steps.validate.outcome }}\`
            #### Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  docker-build:
    name: Docker Build (Predictor)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build predictor image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vertex_ai/serving/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build only — push happens in CD on merge to main.
          # This validates the Dockerfile and all COPY paths are correct.

  predictor-tests:
    name: Predictor & Bridge Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r vertex_ai/serving/requirements.txt
          pip install -r vertex_ai/bridge/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          # Minimal env vars so predictor.py can be imported without connecting to GCP.
          # Tests mock all GCP clients — no live GCP access needed in CI.
          # conftest.py provides setdefault fallbacks for anything not set here.
          GOOGLE_CLOUD_PROJECT: test-project
          FEATURE_STORE_ID: test_feature_store
          AIP_STORAGE_URI: /tmp/test-model
          PREDICTION_LOGS_TABLE: test-project.test_dataset.prediction_logs
          TESTING: "true"
        run: |
          pytest vertex_ai/tests/ -v --cov=vertex_ai --cov-report=term-missing

  dataflow-tests:
    name: Dataflow Transform Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Matches the Flex Template base image (python310-template-launcher-base).
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r pipelines/dataflow/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest pipelines/dataflow/tests/ -v

  cost-guard-tests:
    name: Cost-Guard Function Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Matches the Cloud Function runtime (python312 in modules/cost-guard/main.tf).
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r infrastructure/terraform/modules/cost-guard/function/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest infrastructure/terraform/modules/cost-guard/function/tests/ -v
