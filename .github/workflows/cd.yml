###############################################################################
# CD — Continuous Deployment
#
# Triggers on merge to main (push event after PR is merged).
# Builds the predictor Docker image, pushes to Artifact Registry,
# and deploys to Cloud Run — zero-downtime rolling update.
#
# Deploy flow:
#   1. Build image tagged with git SHA (immutable, traceable)
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run (gcloud run deploy — atomic swap, instant rollback)
#   4. Smoke test the live Cloud Run URL
#   5. Post deployment summary to the commit
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GCP_PROJECT_ID          — project-6db0f664-1423-47cb-86d
#   GCP_REGION              — us-central1
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — projects/<NUM>/locations/global/workloadIdentityPools/...
#   GCP_SERVICE_ACCOUNT     — github-actions@<PROJECT>.iam.gserviceaccount.com
#   ARTIFACT_REGISTRY_REPO  — stg-ml-containers
###############################################################################

name: CD

on:
  push:
    branches: [main]
    paths:
      - 'vertex_ai/serving/**'
      - 'vertex_ai/training/trainer/**'
      - 'vertex_ai/bridge/**'
      - '.github/workflows/cd.yml'

env:
  PROJECT_ID:          ${{ secrets.GCP_PROJECT_ID }}
  REGION:              ${{ secrets.GCP_REGION }}
  AR_REPO:             ${{ secrets.ARTIFACT_REGISTRY_REPO }}
  SERVICE_NAME:        stg-predictor   # Must match resource_prefix in Terraform + Cloud Run module
  BRIDGE_SERVICE_NAME: stg-bridge      # OSINT integration bridge Cloud Run service

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-8)
          # Predictor image
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/predictor"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tagged=${IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          # Bridge image (same SHA, separate repo path)
          BRIDGE_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/bridge"
          echo "bridge_image=${BRIDGE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "bridge_image_tagged=${BRIDGE_IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "bridge_image_latest=${BRIDGE_IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push predictor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vertex_ai/serving/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.image_tagged }}
            ${{ steps.tag.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SHA tag = immutable reference for this deploy (enables instant rollback).
          # latest tag = convenience for local pulls and first terraform apply.

      - name: Build and push bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vertex_ai/bridge/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.bridge_image_tagged }}
            ${{ steps.tag.outputs.bridge_image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bridge image built from same SHA as predictor so both services are
          # always at the same commit — makes rollback and bisection tractable.

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region:  ${{ env.REGION }}
          image:   ${{ steps.tag.outputs.image_tagged }}
          # Cloud Run performs a zero-downtime rolling deploy:
          # new revision comes up → traffic switches atomically → old revision idles.
          # If startup probe fails, Cloud Run keeps serving old revision automatically.

      - name: Smoke test deployed service
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "Service URL: ${SERVICE_URL}"

          # NOTE: /healthz is intentionally omitted from external smoke tests.
          # Google's edge intercepts that path on *.run.app URLs and returns a
          # platform 404 before the request reaches the container, regardless of
          # container health. The route still exists for internal Cloud Run liveness
          # probes, which bypass the edge and hit the container directly.
          # /readyz is the correct external readiness signal.

          # Readiness check — confirms container is up and model is loaded
          echo "→ Testing /readyz..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${SERVICE_URL}/readyz")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /readyz returned ${STATUS}"
            exit 1
          fi
          echo "  /readyz: ${STATUS} ✓"

          # Prediction endpoint — valid request
          echo "→ Testing /v1/predict (valid request)..."
          RESPONSE=$(curl -sf -X POST "${SERVICE_URL}/v1/predict" \
            -H "Content-Type: application/json" \
            -d '{"instances": ["smoke-test-user-001"]}')
          echo "  Response: ${RESPONSE}"

          # Validate response structure: predictions array with at least one entry
          # that has a non-null churn_risk_score. The field is nested at
          # .predictions[0].churn_risk_score — not the top level — so jq must
          # traverse into the array. jq -e exits non-zero for null/false/missing.
          if ! echo "$RESPONSE" | jq -e '.predictions[0].churn_risk_score' >/dev/null; then
            echo "FAIL: response missing predictions[0].churn_risk_score (or not valid JSON)"
            exit 1
          fi
          echo "  /v1/predict: predictions[0].churn_risk_score present ✓"

          echo ""
          echo "All smoke tests passed. Deployment successful."
          echo "Live URL: ${SERVICE_URL}"

      - name: Check if bridge service exists
        # The bridge Cloud Run service is provisioned by Terraform (along with its
        # runtime SA, Pub/Sub subscription, and Secret Manager references). CD
        # should only update the image once Terraform has created the service;
        # attempting to deploy to a non-existent service fails with PERMISSION_DENIED
        # on the bridge SA (which also doesn't exist yet).
        # Pattern mirrors the GKE existence check below.
        id: bridge-check
        run: |
          if gcloud run services describe ${{ env.BRIDGE_SERVICE_NAME }} \
               --region ${{ env.REGION }} \
               --project ${{ env.PROJECT_ID }} \
               --format="value(name)" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Bridge service ${{ env.BRIDGE_SERVICE_NAME }} found — will deploy"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Bridge service not yet provisioned — skipping (run terraform apply to create it)"
          fi

      - name: Deploy bridge to Cloud Run
        # Skipped until Terraform provisions stg-bridge (SA + service + secrets).
        # On every subsequent CD run after terraform apply, this step deploys the
        # new image. The service is INGRESS_TRAFFIC_INTERNAL_ONLY — no smoke test.
        if: steps.bridge-check.outputs.exists == 'true'
        id: deploy-bridge
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BRIDGE_SERVICE_NAME }}
          region:  ${{ env.REGION }}
          image:   ${{ steps.tag.outputs.bridge_image_tagged }}

      # ─────────────────────────────────────────────────────────────────────────
      # Optional GKE deploy — runs only when the cluster is active.
      #
      # Normal (parked) state: enable_gke=false in Terraform → cluster does not
      # exist → these steps are all skipped → $0 GKE cost.
      #
      # Active state: after running gke-up.yml (or terraform apply enable_gke=true)
      # the cluster exists → these steps deploy the same SHA to GKE automatically.
      #
      # Design: detect cluster existence at runtime rather than via a flag so that
      # no manual secret/variable toggle is needed — the cluster's presence IS
      # the signal.
      # ─────────────────────────────────────────────────────────────────────────

      - name: Check if GKE cluster is active
        id: gke-check
        run: |
          if gcloud container clusters describe stg-gke \
               --region ${{ env.REGION }} \
               --project ${{ env.PROJECT_ID }} \
               --format="value(name)" 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "GKE cluster stg-gke is active — will also deploy to GKE"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "GKE cluster not found — skipping GKE deploy (cost-saving idle state)"
          fi

      - name: Install GKE auth plugin
        if: steps.gke-check.outputs.active == 'true'
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Install Helm
        if: steps.gke-check.outputs.active == 'true'
        uses: azure/setup-helm@v3
        with:
          version: '3.14.0'

      - name: Get GKE credentials
        if: steps.gke-check.outputs.active == 'true'
        run: |
          gcloud container clusters get-credentials stg-gke \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: 'True'

      - name: Ensure predictor-staging namespace exists
        if: steps.gke-check.outputs.active == 'true'
        run: |
          kubectl create namespace predictor-staging --dry-run=client -o yaml | kubectl apply -f -
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: 'True'

      - name: Deploy to GKE via Helm
        if: steps.gke-check.outputs.active == 'true'
        # Deploys the same immutable SHA that went to Cloud Run, keeping both
        # serving targets on identical code. --atomic rolls back automatically
        # if pods fail to become Ready within the timeout.
        run: |
          helm upgrade --install predictor ./helm/predictor \
            -f helm/predictor/values.yaml \
            -f helm/predictor/values-staging.yaml \
            --namespace predictor-staging \
            --set image.tag=${{ steps.tag.outputs.sha }} \
            --atomic \
            --timeout 5m
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: 'True'

      - name: Verify GKE rollout
        if: steps.gke-check.outputs.active == 'true'
        run: |
          kubectl rollout status deployment/predictor \
            --namespace predictor-staging \
            --timeout=5m
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: 'True'

      - name: Output deployment summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Predictor service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bridge service | ${{ env.BRIDGE_SERVICE_NAME }} (internal-only) |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Predictor image | \`${{ steps.tag.outputs.image_tagged }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bridge image | \`${{ steps.tag.outputs.bridge_image_tagged }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Run URL | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GKE deployed | ${{ steps.gke-check.outputs.active == 'true' && 'yes — predictor-staging' || 'no (cluster idle)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
